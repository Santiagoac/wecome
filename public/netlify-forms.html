<!DOCTYPE html>
<html lang="es">
  <body>
    <!--
      Archivo de descubrimiento para Netlify Forms.
      El bot de Netlify escanea archivos estáticos en /public durante el build.
      El formulario real se envía vía JS desde el componente React.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="website" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input type="checkbox" name="consent" />
      <input type="text" name="website" />
    </form>
    <form name="une-reclamacion" data-netlify="true" netlify-honeypot="website" hidden>
      <input type="text" name="empresa" />
      <input type="text" name="nombre" />
      <input type="tel" name="telefono" />
      <input type="text" name="horario" />
      <input type="email" name="email" />
      <input type="text" name="tipo" />
      <textarea name="descripcion"></textarea>
      <input type="checkbox" name="consent" />
      <input type="text" name="website" />
    </form>
  </body>
</html>
